name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_PROVIDER: sqlite
      DATABASE_URL: ':memory:'
      AUTH_PROVIDER: local
      AUTH_SECRET: ci-only-secret-at-least-32-bytes-long
      HOST_MODE: team
      REGISTRATION: closed
      BILLING_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
